<div class="graph-section py-16 bg-white">
  <div class="max-w-4xl mx-auto px-6">
    <!-- 제목 -->
    <h3 class="text-3xl font-bold text-center mb-3">신축 vs 본 현장 가격 비교</h3>
    <p class="text-xl text-center text-gray-600 mb-12">
      평당 1,400만원 → <span class="text-blue-600 font-bold">최대 지원금 적용 시 600만원대</span>
    </p>

    <div class="space-y-10">
      <!-- 신축 예상 -->
      <div>
        <div class="flex items-center gap-6">
          <div class="w-32 text-right font-medium text-gray-500">신축 예상</div>
          <div class="flex-1">
            <div class="h-14 bg-gray-300 rounded-xl relative overflow-hidden">
              <div class="bar h-full bg-gray-400 rounded-xl w-[85%]" style="width: 0%;" id="bar1"></div>
            </div>
          </div>
          <div class="w-28 text-right">
            <span class="text-2xl font-bold text-gray-700">1,400만원</span>
          </div>
        </div>
      </div>

      <!-- 본 현장 -->
      <div>
        <div class="flex items-center gap-6">
          <div class="w-32 text-right font-medium text-blue-700">본 현장</div>
          <div class="flex-1">
            <div class="h-14 bg-blue-100 rounded-xl relative overflow-hidden">
              <div class="bar h-full bg-blue-600 rounded-xl w-[42%]" style="width: 0%;" id="bar2"></div>
            </div>
          </div>
          <div class="w-28 text-right">
            <span class="text-3xl font-bold text-blue-700">600만원대</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 강조 문구 -->
    <div class="text-center mt-10">
      <p class="inline-block bg-red-50 text-red-600 px-6 py-3 rounded-2xl text-lg font-semibold">
        약 57% 비용 절감
      </p>
    </div>
  </div>
</div>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        document.getElementById('bar1').style.width = '85%';
        document.getElementById('bar2').style.width = '42%';
      }
    });
  }, { threshold: 0.6 });

  observer.observe(document.querySelector('.graph-section'));
});
</script>
